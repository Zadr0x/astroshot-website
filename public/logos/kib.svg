<div style="clear:both;"><h2>About Kuwait International Bank</h2>
<p>Kuwait International Bank K.S.C.P., together with its subsidiaries, provides Islamic banking products and services for individual and corporate customers in Kuwait. The company operates through Commercial and International Banking; Retail Banking; Treasury, Fund Management, and Institutional Banking; Investment Management; and Others segments. The company offers various personal banking products and services, including youth, current, savings, and salary accounts; Wakala, flexible, long term, and KIB term deposits; vehicle, construction material, medical, and goods Murabaha financing products; debit, credit, and prepaid cards; online and mobile banking, safety deposit box, and customs bills payment services; and travel insurance services. It also provides commercial banking products and services, such as corporate services cards; call accounts; paycards; contracting and project financing; corporate financing products comprising various financing facilities; real estate financing; and real estate appraisal services. In addition, the company offers property management services, including marketing and managing properties, collection of rent, online rent payment, preparing accounting reports, maintenance services, and legal services, as well as ATM services. Further, it provides liquidity management, correspondent banking, clearing, Murabaha investments, and exchange of deposits with banks and other financial institutions, as well as commodity Murabaha finance, Ijara, and Wakala facilities. Additionally, the company is involved in the purchase and sale of properties, leasing, and other trading activities. Kuwait International Bank K.S.C.P. was incorporated in 1973 and is based in Kuwait City, Kuwait.</p></div>        </div>

